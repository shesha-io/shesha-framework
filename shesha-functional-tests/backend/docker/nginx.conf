# nginx.conf
events {
    worker_connections 1024;  # Maximum number of simultaneous connections
    use epoll;                 # Efficient event processing on Linux
    multi_accept on;           # Accept all new connections at once
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;         # Hide nginx version for security
    
    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging format with upstream info for debugging
    log_format upstream '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'upstream: $upstream_addr | $upstream_response_time';
    
    access_log /var/log/nginx/access.log upstream;
    error_log /var/log/nginx/error.log warn;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss application/rss+xml;
    
    # Upstream configuration - ASP.NET Core application instances
    upstream aspnetcore_app {
        # Load balancing methods:
        # least_conn;           # Send to server with fewest connections
        # ip_hash;              # Sticky sessions based on client IP
        # random;               # Random distribution
        
        # Keepalive connections to upstream servers
        keepalive 32;
        
        # Define backend servers
        server app-instance-1:8080 max_fails=3 fail_timeout=30s;
        server app-instance-2:8080 max_fails=3 fail_timeout=30s;
        # server app-instance-3:8080 max_fails=3 fail_timeout=30s;
        
        # For dynamic scaling, you can also use:
        # server app-instance-4:80 backup;  # Backup server
    }
    
    # Main server block
    server {
        listen 80;
        server_name localhost;
        
        # Root directory for static files (optional)
        root /usr/share/nginx/html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Proxy settings for ASP.NET Core
        location / {
            # Pass request to upstream
            proxy_pass http://aspnetcore_app;
            proxy_http_version 1.1;
            
            # Headers for proper forwarding
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # For WebSockets/SignalR support
            proxy_set_header Connection "";
            
            # Buffering settings for better performance
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Enable keepalive to upstream
            proxy_set_header Connection "";
            
            # Response buffering
            proxy_max_temp_file_size 0;
            
            # Caching settings (optional)
            # proxy_cache my_cache;
            # proxy_cache_bypass $http_upgrade;
            # proxy_cache_valid 200 302 10m;
            # proxy_cache_valid 404 1m;
        }
        
        # Health check endpoint
        location /health {
            access_log off;
            proxy_pass http://aspnetcore_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Return 200 with minimal processing
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_connect_timeout 2s;
        }
        
        # WebSocket support for SignalR
        location /hubs/ {
            proxy_pass http://aspnetcore_app;
            proxy_http_version 1.1;
            
            # WebSocket headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Longer timeout for WebSocket connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        
        # Static files handling (if you serve static content)
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
        
        # Metrics endpoint for monitoring (if using Prometheus)
        location /metrics {
            access_log off;
            allow 172.16.0.0/12;  # Allow internal network
            deny all;               # Deny external access
            proxy_pass http://aspnetcore_app;
        }
        
        # Swagger UI
        location /swagger/ {
            proxy_pass http://aspnetcore_app/swagger/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
    
    # Optional: HTTPS server block (if you need SSL)
    # server {
    #     listen 443 ssl http2;
    #     server_name localhost;
    #     
    #     ssl_certificate /etc/nginx/ssl/server.crt;
    #     ssl_certificate_key /etc/nginx/ssl/server.key;
    #     
    #     # SSL configuration
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     
    #     # Same location blocks as above
    #     location / {
    #         proxy_pass http://aspnetcore_app;
    #         # ... same proxy settings
    #     }
    # }
}