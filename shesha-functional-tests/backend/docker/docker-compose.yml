services:
  # Redis service for distributed locks
  redis:
    image: redis:7-alpine  # Updated to Redis 7
    container_name: app-redis
    ports:
      - target: 6379
        published: 6379
        protocol: tcp
        mode: host
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:  # Add healthcheck for better orchestration
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data  # Persistent volume for Redis
    command: redis-server --appendonly yes  # Enable AOF persistence
    deploy:
      resources:  # Resource limits (Compose v3+)
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Multiple instances of your ASP.NET Core app
  app-instance-1:
    build:
      context: ../
      dockerfile: ./src/Boxfusion.SheshaFunctionalTests.Web.Host/Dockerfile
      args:  # Build-time arguments
        - BUILD_CONFIGURATION=Release
        - DOTNET_VERSION=8.0
    container_name: app-instance-1
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - SheshaRedis__ConnectionString=redis:6379
      # - SheshaRedis__DatabaseId=1
      - INSTANCE_ID=instance-1
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false  # If using globalization
    depends_on:
      redis:
        condition: service_healthy  # Wait for Redis to be healthy
    networks:
      - app-network
    volumes:
      - app-data:/app/data
      - type: bind  # Bind mount for configuration (optional)
        source: ../src/Boxfusion.SheshaFunctionalTests.Web.Host/appsettings.json
        target: /app/appsettings.json
        read_only: true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:  # Structured logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app-instance-2:
    build:
      context: ../
      dockerfile: ./src/Boxfusion.SheshaFunctionalTests.Web.Host/Dockerfile
      args:  # Build-time arguments
        - BUILD_CONFIGURATION=Release
        - DOTNET_VERSION=8.0
    container_name: app-instance-2
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - SheshaRedis__ConnectionString=redis:6379
      # - SheshaRedis__DatabaseId=1
      - INSTANCE_ID=instance-2
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false  # If using globalization
    depends_on:
      redis:
        condition: service_healthy  # Wait for Redis to be healthy
    networks:
      - app-network
    volumes:
      - app-data:/app/data
      - type: bind  # Bind mount for configuration (optional)
        source: ../src/Boxfusion.SheshaFunctionalTests.Web.Host/appsettings.json
        target: /app/appsettings.json
        read_only: true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:  # Structured logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx load balancer
  nginx:
    image: nginx:alpine
    container_name: app-load-balancer
    ports:
      - target: 80
        published: 21021
        protocol: tcp
        mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - type: bind
        source: ./nginx
        target: /etc/nginx/conf.d
        read_only: true
    depends_on:
      app-instance-1:
        condition: service_started
      app-instance-2:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
    driver: bridge
    ipam:  # Custom IPAM configuration
      driver: default
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

volumes:
  redis-data:
    driver: local
    driver_opts:
      type: none
      device: ./data/redis
      o: bind
  app-data:
    driver: local
  prometheus-data:
    driver: local